# Generated from:
# https://github.com/plone/meta/tree/main/src/plone/meta/default
# See the inline comments on how to expand/tweak this configuration file
[meta]
template = "default"
commit-id = "2.6.1.dev0"

[github]
# no 'coverage' job, as our tests have a different setup.
jobs = [
   "qa",
   "dependencies",
   "release_ready",
   "circular",
   ]

[pyproject]
check_manifest_ignores = """
    "buildout.cfg",
"""

[tox]
use_test_matrix = false
envlist_lines = """
    py{310,311,312,313,314}
"""
config_lines = """
[testenv:py{310,311,312,313,314}]
description = run the buildout tests
use_develop = false
skip_install = true
extras = tests
# Suppress warnings like this, which interfere with the expected test output:
# UserWarning: pkg_resources is deprecated as an API.
set_env =
    PYTHONWARNINGS = ignore::DeprecationWarning,ignore::UserWarning
deps =
    -r requirements.txt
commands_pre =
    {envbindir}/buildout -nc {toxinidir}/buildout.cfg buildout:directory={envdir} buildout:develop={toxinidir}
commands =
    {envbindir}/test {posargs:-cv}
"""
